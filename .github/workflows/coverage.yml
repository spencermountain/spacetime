# sends test-coverage data to codecov.io
# https://codecov.io/gh/spencermountain/spacetime
name: Coverage

on:
  push:
    branches: [master]

jobs:
  getCoverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run codecov
